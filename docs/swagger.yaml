basePath: /
definitions:
  handlers.CreateNotificationRequest:
    properties:
      data:
        additionalProperties:
          type: string
        type: object
      priority:
        $ref: '#/definitions/models.Priority'
      template_id:
        type: string
      type:
        $ref: '#/definitions/models.NotificationType'
      user_id:
        type: string
    type: object
  handlers.CreateTemplateRequest:
    properties:
      content:
        type: string
      template_id:
        type: string
    type: object
  handlers.UpdateTemplateRequest:
    properties:
      content:
        type: string
    type: object
  models.Notification:
    properties:
      created_at:
        type: string
      id:
        type: string
      message:
        type: string
      priority:
        $ref: '#/definitions/models.Priority'
      read:
        type: boolean
      template_id:
        type: string
      type:
        $ref: '#/definitions/models.NotificationType'
      user_id:
        type: string
    type: object
  models.NotificationType:
    enum:
    - alert
    - success
    - info
    - warning
    type: string
    x-enum-varnames:
    - TypeAlert
    - TypeSuccess
    - TypeInfo
    - TypeWarning
  models.Priority:
    enum:
    - low
    - normal
    - high
    type: string
    x-enum-varnames:
    - PriorityLow
    - PriorityNormal
    - PriorityHigh
  models.Template:
    properties:
      content:
        type: string
      created_at:
        type: string
      is_deleted:
        type: boolean
      template_id:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is a notification service backend.
  title: Notification Service API
  version: "1.0"
paths:
  /notifications:
    post:
      consumes:
      - application/json
      description: Create a notification using a template
      parameters:
      - description: Notification request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateNotificationRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Notification'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a notification
      tags:
      - notifications
  /notifications/{id}/read:
    patch:
      description: Mark a specific notification as read by its ID
      parameters:
      - description: Notification ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Mark a notification as read
      tags:
      - notifications
  /notifications/user/{user_id}:
    get:
      description: Get a list of notifications for a specific user
      parameters:
      - description: User ID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Notification'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get user notifications
      tags:
      - notifications
  /templates:
    get:
      description: Get a list of all templates
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.Template'
            type: array
      summary: List templates
      tags:
      - templates
    post:
      consumes:
      - application/json
      description: Create a template with the given content
      parameters:
      - description: Template request payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.CreateTemplateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.Template'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Create a new template
      tags:
      - templates
  /templates/{id}:
    delete:
      description: Delete a template by its ID
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Delete a template
      tags:
      - templates
    get:
      description: Get a single template by its ID
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Template'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a template
      tags:
      - templates
    put:
      consumes:
      - application/json
      description: Update an existing template by its ID
      parameters:
      - description: Template ID
        in: path
        name: id
        required: true
        type: string
      - description: Template update payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.UpdateTemplateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Template'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Update a template
      tags:
      - templates
swagger: "2.0"
